name = "news-summary"
main = "worker/index.ts"
compatibility_date = "2026-05-29"

# ── D1 数据库 ──
# 部署前先运行: wrangler d1 create news-db
# 然后将返回的 database_id 填入下方
[[d1_databases]]
binding = "DB"
database_name = "news-db"
database_id = "39f5fa9a-0e09-44c6-a1cf-ef486e815e69"

# ── 定时抓取（每周一 UTC 01:00 = 北京时间 09:00） ──
[triggers]
crons = ["0 1 * * 1"]
